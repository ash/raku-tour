name: build & deploy

# Build the tour with the released rakupp binary, verify every example against
# it (the build fails on any drift between lessons and interpreter), and
# publish out/ to GitHub Pages. Dogfooding all the way down: the site about
# Raku++ is generated by a Raku program run by Raku++.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install rakupp (latest release binary)
        run: |
          curl -fsSL https://github.com/ash/rakupp/releases/latest/download/rakupp-linux-x86_64.tar.gz | tar -xz -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/rakupp/bin" >> "$GITHUB_PATH"

      - name: Build + verify every example
        run: |
          rakupp --version
          rakupp build.raku --clean --verify

      # Pages serves the artifact as-is; .nojekyll switches Jekyll's
      # processing off so nothing in out/ is reinterpreted.
      - name: Finalize site
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
